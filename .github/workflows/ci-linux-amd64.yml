name: CI (Linux amd64)

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install libpcap headers (CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpcap-dev

      - name: Build (linux/amd64)
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -v -trimpath -o dist/paqet_linux_amd64 ./cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: paqet-linux-amd64
          path: dist/paqet_linux_amd64
          retention-days: 7
